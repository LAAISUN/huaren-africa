
<!DOCTYPE html>
<html>
<head>
  <title>非洲信息平台</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h1>🌍 非洲信息平台</h1>

<h2>📝 发布信息</h2>

<input id="title" placeholder="标题"><br><br>
<input id="price" placeholder="价格"><br><br>
<input id="contact" placeholder="联系方式"><br><br>

<button onclick="post()">发布</button>

<hr>

<h3>📌 信息列表</h3>
<div id="list"></div>

<script>
const supabaseUrl = "https://qomnfxajlprecoodbglm.supabase.co";
const supabaseKey = "sb_publishable_D4aBPB66bpIm9b3fEvZuug_w7-t-_03";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function post(){
  let title = document.getElementById('title').value;
  let price = document.getElementById('price').value;
  let contact = document.getElementById('contact').value;

  const { error } = await supabase
    .from('houses')
    .insert([{ title, price, contact }]);

  if(error){
    alert("失败：" + error.message);
    return;
  }

  alert("发布成功！");
  loadData();
}

async function loadData(){
  let { data } = await supabase
    .from('houses')
    .select('*')
    .order('id', { ascending: false });

  let html = "";
  data.forEach(item => {
    html += `<div>
      🏠 ${item.title}<br>
      💰 ${item.price}<br>
      📞 ${item.contact}
    </div><hr>`;
  });

  document.getElementById("list").innerHTML = html;
}

loadData();
</script>

</body>
</html>
