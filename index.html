<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非洲华人信息平台</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: green;
  color: white;
  border: none;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="header">🌍 非洲华人信息平台</div>

<div class="container">

<div class="card">
<h3>发布信息</h3>

<input id="title" placeholder="标题（如：达喀尔房屋出租）">
<input id="price" placeholder="价格">
<input id="contact" placeholder="联系方式">

<button onclick="post()">发布</button>
</div>

<div class="card">
<h3>最新信息</h3>
<div id="list"></div>
</div>

</div>

<script>
const supabaseUrl = "你的URL";
const supabaseKey = "你的anon key";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function post() {
  let title = document.getElementById("title").value;
  let price = document.getElementById("price").value;
  let contact = document.getElementById("contact").value;

  if(!title){
    alert("请输入标题");
    return;
  }

  const { error } = await supabase
    .from("houses")
    .insert([{ title, price, contact }]);

  if(error){
    alert("发布失败：" + error.message);
  } else {
    alert("发布成功！");
    loadData();
  }
}

async function loadData() {
  let { data } = await supabase
    .from("houses")
    .select("*")
    .order("id", { ascending: false });

  let html = "";

  data.forEach(item => {
    html += `
      <div style="border-bottom:1px solid #ddd;padding:8px 0;">
        <b>${item.title}</b><br>
        💰 ${item.price}<br>
        📞 ${item.contact}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

loadData();
</script>

</body>
</html>
