<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>非洲华人信息网</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h1>🌍 非洲华人信息网</h1>
<p>租房｜招聘｜二手｜服务｜一站式信息平台</p >

<hr>

<h2>📝 发布信息</h2>

<input id="title" placeholder="例如：达喀尔两室一厅出租"><br><br>
<input id="price" placeholder="价格（例如：5000/月）"><br><br>
<input id="contact" placeholder="联系方式（微信/电话）"><br><br>

<button onclick="post()">发布信息</button>

<hr>

<h2>📌 最新信息</h2>
<div id="list"></div>

<script>
const supabaseUrl = "你的URL";
const supabaseKey = "你的anon key";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function post(){
  let title = document.getElementById('title').value;
  let price = document.getElementById('price').value;
  let contact = document.getElementById('contact').value;

  const { error } = await supabase
    .from('houses')
    .insert([{ title, price, contact }]);

  if(error){
    alert("发布失败：" + error.message);
    return;
  }

  alert("发布成功！");
  loadData();
}

async function loadData(){
  let { data } = await supabase
    .from('houses')
    .select('*')
    .order('id', { ascending: false });

  let html = "";

  data.forEach(item => {
    html += `
      <div style="border:1px solid #ddd;margin:10px;padding:10px;">
        🏠 ${item.title}<br>
        💰 ${item.price}<br>
        📞 ${item.contact}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

loadData();
</script>

</body>
</html>
